<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS1430 Computer Vision - Final Project</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: ##D6D6B1;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: ##19297C;
      --accent2: #57c8ff;
      --text: #6c91c2;
      --muted: #5a5a7a;
      --error: #ff5757;
      --radius: 16px;
    }

    body {
      font-family: 'Love Ya Like A Sister', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,87,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,87,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      margin-bottom: 3rem;
      text-align: left;
    }

    .label-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Drop Zone */
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      outline: none;
    }

    .drop-zone:hover,
    .drop-zone:focus-visible {
      border-color: var(--accent);
      background: #16161f;
      transform: translateY(-2px);
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: #1a1f0f;
      transform: scale(1.01);
    }

    .drop-zone.has-image {
      padding: 0;
      border-color: var(--accent2);
      overflow: hidden;
    }

    /* Icon */
    .drop-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      position: relative;
    }

    .drop-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--muted);
      transition: stroke 0.2s;
    }

    .drop-zone:hover .drop-icon svg,
    .drop-zone.drag-over .drop-icon svg {
      stroke: var(--accent);
    }

    .drop-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .drop-sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .drop-sub strong {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Hidden file input */
    #fileInput {
      display: none;
    }

    /* Preview */
    .preview-wrap {
      display: none;
      position: relative;
    }

    .preview-wrap img {
      display: block;
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: calc(var(--radius) - 2px);
      background: #0d0d14;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,0.85) 0%, transparent 50%);
      border-radius: calc(var(--radius) - 2px);
      display: flex;
      align-items: flex-end;
      padding: 1.25rem 1.5rem;
      gap: 0.75rem;
    }

    .file-info {
      flex: 1;
      text-align: left;
    }

    .file-name {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .file-size {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .btn-remove {
      background: rgba(255,87,87,0.15);
      border: 1px solid var(--error);
      color: var(--error);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-remove:hover {
      background: rgba(255,87,87,0.3);
    }

    /* Metadata bar */
    .meta-bar {
      display: none;
      margin-top: 1rem;
      padding: 0.9rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .meta-key {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .meta-val {
      font-size: 0.78rem;
      color: var(--accent2);
    }

    /* Options row */
    .options-row {
      display: none;
      margin-top: 1.25rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .chip input[type="radio"] { display: none; }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip.active {
      border-color: var(--accent);
      background: rgba(200,255,87,0.08);
      color: var(--accent);
    }

    .chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .chip.active .dot { background: var(--accent); }

    /* Submit button */
    .btn-submit {
      display: none;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem 2rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,255,87,0.25);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Progress bar */
    .progress-wrap {
      display: none;
      margin-top: 1rem;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* Status message */
    .status {
      display: none;
      margin-top: 1rem;
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
    }

    .status.success {
      background: rgba(200,255,87,0.08);
      border: 1px solid rgba(200,255,87,0.3);
      color: var(--accent);
    }

    .status.error {
      background: rgba(255,87,87,0.08);
      border: 1px solid rgba(255,87,87,0.3);
      color: var(--error);
    }

    /* Footer */
    footer {
      margin-top: 3rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
    }

    /* Drag-over global overlay */
    .global-drag-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(200,255,87,0.05);
      border: 3px dashed rgba(200,255,87,0.4);
      z-index: 999;
      pointer-events: none;
      border-radius: 0;
    }

    body.dragging-global .global-drag-hint { display: block; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header  { animation: fadeUp 0.5s ease both; }
    .drop-zone { animation: fadeUp 0.5s 0.1s ease both; }
  </style>
</head>
<body>

<div class="global-drag-hint"></div>

<div class="container">
  <header>
    <div class="label-tag">// image processor</div>
    <h1>Drop your<br/><span>image.</span></h1>
    <p class="subtitle">drag &amp; drop or browse for an image! Then we'll turn it into a coloring page for you!</p>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Upload image">
    <!-- Default state -->
    <div id="dropDefault">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-title">Drag &amp; drop your image here</div>
      <div class="drop-sub">or <strong id="browseLink">browse files</strong> &nbsp;·&nbsp; PNG, JPG, WEBP, GIF</div>
    </div>

    <!-- Preview state -->
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Preview"/>
      <div class="preview-overlay">
        <div class="file-info">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="btn-remove" id="btnRemove" type="button">✕ Remove</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*"/>

  <!-- Meta bar -->
  <div class="meta-bar" id="metaBar">
    <div class="meta-item">
      <span class="meta-key">Width</span>
      <span class="meta-val" id="metaW">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-key">Height</span>
      <span class="meta-val" id="metaH">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-key">Type</span>
      <span class="meta-val" id="metaType">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-key">Size</span>
      <span class="meta-val" id="metaSize">—</span>
    </div>
  </div>

  <!-- Processing options -->
  <div class="options-row" id="optionsRow">
    <label class="chip active" id="chip-analyze">
      <input type="radio" name="mode" value="analyze" checked/>
      <span class="dot"></span> Analyze
    </label>
    <label class="chip" id="chip-enhance">
      <input type="radio" name="mode" value="enhance"/>
      <span class="dot"></span> Enhance
    </label>
    <label class="chip" id="chip-compress">
      <input type="radio" name="mode" value="compress"/>
      <span class="dot"></span> Compress
    </label>
    <label class="chip" id="chip-convert">
      <input type="radio" name="mode" value="convert"/>
      <span class="dot"></span> Convert
    </label>
  </div>

  <!-- Submit -->
  <button class="btn-submit" id="btnSubmit" type="button">Process Image →</button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Status -->
  <div class="status" id="statusMsg"></div>
</div>

<footer>max file size 20mb &nbsp;·&nbsp; your files are never stored</footer>

<script>
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const browseLink  = document.getElementById('browseLink');
  const dropDefault = document.getElementById('dropDefault');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const fileName    = document.getElementById('fileName');
  const fileSize    = document.getElementById('fileSize');
  const btnRemove   = document.getElementById('btnRemove');
  const metaBar     = document.getElementById('metaBar');
  const metaW       = document.getElementById('metaW');
  const metaH       = document.getElementById('metaH');
  const metaType    = document.getElementById('metaType');
  const metaSize    = document.getElementById('metaSize');
  const optionsRow  = document.getElementById('optionsRow');
  const btnSubmit   = document.getElementById('btnSubmit');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const statusMsg   = document.getElementById('statusMsg');

  let currentFile = null;

  // ── Chip toggle ──────────────────────────────────────────────────
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });

  // ── Browse link ───────────────────────────────────────────────────
  browseLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener('click', () => { if (!currentFile) fileInput.click(); });
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  // ── Drag & Drop on drop zone ──────────────────────────────────────
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
    else showStatus('Please drop a valid image file.', 'error');
  });

  // ── Global drag hint ──────────────────────────────────────────────
  let dragCounter = 0;
  document.addEventListener('dragenter', () => { dragCounter++; document.body.classList.add('dragging-global'); });
  document.addEventListener('dragleave', () => { dragCounter--; if (dragCounter === 0) document.body.classList.remove('dragging-global'); });
  document.addEventListener('drop', () => { dragCounter = 0; document.body.classList.remove('dragging-global'); });

  // ── Load file ─────────────────────────────────────────────────────
  function loadFile(file) {
    const MAX = 20 * 1024 * 1024;
    if (file.size > MAX) { showStatus('File exceeds 20 MB limit.', 'error'); return; }

    currentFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;

    previewImg.onload = () => {
      metaW.textContent    = previewImg.naturalWidth + ' px';
      metaH.textContent    = previewImg.naturalHeight + ' px';
    };

    metaType.textContent = file.type || 'unknown';
    metaSize.textContent = formatBytes(file.size);

    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);

    // Show preview
    dropDefault.style.display = 'none';
    previewWrap.style.display = 'block';
    dropZone.classList.add('has-image');

    // Reveal extras
    [metaBar, optionsRow, btnSubmit].forEach(el => {
      el.style.display = el === optionsRow ? 'flex' : el === metaBar ? 'flex' : 'block';
      el.style.animation = 'fadeUp 0.35s ease both';
    });

    hideStatus();
  }

  // ── Remove ────────────────────────────────────────────────────────
  btnRemove.addEventListener('click', e => {
    e.stopPropagation();
    reset();
  });

  function reset() {
    currentFile = null;
    fileInput.value = '';
    previewImg.src = '';
    previewWrap.style.display = 'none';
    dropDefault.style.display = 'block';
    dropZone.classList.remove('has-image');
    [metaBar, optionsRow, btnSubmit, progressWrap].forEach(el => el.style.display = 'none');
    progressBar.style.width = '0%';
    hideStatus();
  }

  // ── Submit ────────────────────────────────────────────────────────
  btnSubmit.addEventListener('click', async () => {
    if (!currentFile) return;
    const mode = document.querySelector('input[name="mode"]:checked').value;

    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Processing…';
    progressWrap.style.display = 'block';
    hideStatus();
    animateProgress();

    const formData = new FormData();
    formData.append('image', currentFile);
    formData.append('mode', mode);

    try {
      // ── Replace '/api/process' with your actual backend endpoint ──
      const response = await fetch('/api/process', {
        method: 'POST',
        body: formData,
      });

      progressBar.style.width = '100%';

      if (response.ok) {
        const result = await response.json();
        showStatus(`✓ Done! ${result.message || 'Image processed successfully.'}`, 'success');
      } else {
        const err = await response.json().catch(() => ({}));
        showStatus(`✗ Error ${response.status}: ${err.message || 'Processing failed.'}`, 'error');
      }
    } catch (err) {
      showStatus('✗ Network error — is your backend running?', 'error');
    } finally {
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Process Image →';
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────
  function animateProgress() {
    let p = 0;
    progressBar.style.width = '0%';
    const id = setInterval(() => {
      p += Math.random() * 18;
      if (p >= 90) { clearInterval(id); p = 90; }
      progressBar.style.width = p + '%';
    }, 200);
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status ' + type;
    statusMsg.style.display = 'block';
  }

  function hideStatus() {
    statusMsg.style.display = 'none';
    statusMsg.className = 'status';
  }
</script>
</body>
</html>
